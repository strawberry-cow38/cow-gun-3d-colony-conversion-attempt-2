<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cow-gun-3d</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Great+Vibes&display=swap"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #ddd;
        font-family: monospace;
        overflow: hidden;
      }
      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        top: 8px;
        left: 8px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #44ff8866;
        color: #ddffdd;
        font-size: 12px;
        line-height: 1.35;
        white-space: pre;
        pointer-events: none;
      }
      #clock {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 14px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #ffd07066;
        color: #ffe8b8;
        font-family: monospace;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.05em;
        pointer-events: none;
        white-space: pre;
        text-align: center;
        line-height: 1.15;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="hud">phase 0: scaffold</div>
    <div id="clock">00:00</div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
