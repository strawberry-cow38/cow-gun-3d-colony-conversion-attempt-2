<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>cow-gun-3d</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #111;
        color: #ddd;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        overflow: hidden;
      }
      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #hud {
        position: fixed;
        bottom: 8px;
        right: 8px;
        padding: 6px 10px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #44ff8866;
        color: #ddffdd;
        font-size: 12px;
        line-height: 1.35;
        white-space: pre;
        pointer-events: none;
      }
      #clock {
        position: fixed;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px 14px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #ffd07066;
        color: #ffe8b8;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.05em;
        pointer-events: none;
        white-space: pre;
        text-align: center;
        line-height: 1.15;
      }
      #hover-tooltip {
        position: fixed;
        bottom: 8px;
        right: 8px;
        padding: 4px 10px;
        background: rgba(0, 0, 0, 0.55);
        color: #ffffff;
        font-size: 13px;
        letter-spacing: 0.02em;
        pointer-events: none;
        white-space: nowrap;
        display: none;
      }
      #layer-picker {
        position: fixed;
        top: 8px;
        right: 8px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 6px;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid #88bbff66;
        border-radius: 6px;
        user-select: none;
      }
      #layer-picker button {
        width: 44px;
        height: 44px;
        background: rgba(30, 40, 60, 0.8);
        color: #cfe3ff;
        border: 1px solid #88bbff88;
        border-radius: 4px;
        font-size: 18px;
        cursor: pointer;
        touch-action: manipulation;
      }
      #layer-picker button:active {
        background: rgba(60, 90, 140, 0.9);
      }
      #layer-label {
        color: #cfe3ff;
        font-size: 13px;
        font-weight: 600;
        min-width: 28px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="hud" style="display: none"></div>
    <div id="clock">00:00</div>
    <div id="hover-tooltip"></div>
    <div id="layer-picker">
      <button id="layer-up" type="button" aria-label="Layer up">▲</button>
      <span id="layer-label">Z0</span>
      <button id="layer-down" type="button" aria-label="Layer down">▼</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
